services:
  bff:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./local-data:/data
    environment:
      DEV_JWT: "true"
      JWT_SECRET: "dev-secret"
      LOCAL_DATA_DIR: "/data"
    command: ["/bff", "--local", "/data"]

  frontend:
    build:
      context: ${FRONTEND_CONTEXT:-../llm-wiki-frontend}
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      NEXT_PUBLIC_DEV_USER_ID: "local-user"
      NEXT_PUBLIC_DEV_PROJECT_ID: "demo"
    depends_on:
      - bff
