name: Promote OLW worker to Cloud Run (production)

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Full lowercase commit SHA for an image already built by the main dev workflow
        required: true
        type: string

env:
  PROJECT_ID: llm-wiki-cloud
  REGION: asia-east1
  AR_REPO: asia-east1-docker.pkg.dev/llm-wiki-cloud/cloud-run-images
  JOB_NAME: olw-pipeline

concurrency:
  group: promote-olw-pipeline-production
  cancel-in-progress: false

jobs:
  promote:
    if: github.ref == 'refs/heads/main'
    name: Promote immutable worker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Checkout main
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize deployment evidence paths
        run: |
          set -euo pipefail
          EVIDENCE_DIR="$RUNNER_TEMP/worker-deployment-evidence"
          ROLLBACK_CONTRACT="$EVIDENCE_DIR/rollback-contract.json"
          METADATA="$EVIDENCE_DIR/metadata.json"
          EVIDENCE="$EVIDENCE_DIR/deployment-evidence.json"
          EVIDENCE_FAILURE="$EVIDENCE_DIR/deployment-evidence-failure.json"
          printf 'EVIDENCE_DIR=%s\nROLLBACK_CONTRACT=%s\nMETADATA=%s\nEVIDENCE=%s\nEVIDENCE_FAILURE=%s\n' \
            "$EVIDENCE_DIR" "$ROLLBACK_CONTRACT" "$METADATA" "$EVIDENCE" "$EVIDENCE_FAILURE" >> "$GITHUB_ENV"

      - name: Validate promotion commit
        id: commit
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          set -euo pipefail
          if [[ ! "$COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "commit_sha must be a 40-character lowercase commit SHA"
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "${GITHUB_SHA}" ]]; then
            echo "checkout HEAD does not match the workflow commit"
            exit 1
          fi
          if ! git cat-file -e "$COMMIT_SHA^{commit}"; then
            echo "commit_sha does not identify a commit"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$COMMIT_SHA" HEAD; then
            echo "commit_sha is not an ancestor of the checked-out main commit"
            exit 1
          fi
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Locate successful main dev deployment
        id: dev_run
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
        run: |
          set -euo pipefail
          RUN_JSON=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-worker.yml/runs?event=push&status=completed&head_sha=${COMMIT_SHA}&per_page=100" \
            | jq -ce --arg sha "$COMMIT_SHA" 'first(.workflow_runs[] | select(.event == "push" and .head_branch == "main" and .head_sha == $sha and .conclusion == "success")) // error("no successful main push run")')
          RUN_ID=$(jq -er '.id | select(type == "number" and . > 0)' <<<"$RUN_JSON")
          RUN_URL=$(jq -er '.html_url | select(type == "string" and startswith("https://"))' <<<"$RUN_JSON")
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
          echo "run_event=$(jq -er '.event' <<<"$RUN_JSON")" >> "$GITHUB_OUTPUT"
          echo "run_head_branch=$(jq -er '.head_branch' <<<"$RUN_JSON")" >> "$GITHUB_OUTPUT"
          echo "run_head_sha=$(jq -er '.head_sha' <<<"$RUN_JSON")" >> "$GITHUB_OUTPUT"
          echo "run_conclusion=$(jq -er '.conclusion' <<<"$RUN_JSON")" >> "$GITHUB_OUTPUT"

      - name: Download exact dev image digest
        id: image
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
          DEV_RUN_ID: ${{ steps.dev_run.outputs.run_id }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/worker-image-digest"
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"
          gh run download "$DEV_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "worker-image-digest-$COMMIT_SHA" \
            --dir "$ARTIFACT_DIR"
          DIGEST_FILE="$ARTIFACT_DIR/worker-image-digest-$COMMIT_SHA.txt"
          if [[ ! -f "$DIGEST_FILE" ]] || [[ $(find "$ARTIFACT_DIR" -type f | wc -l) -ne 1 ]]; then
            echo "digest artifact contents are missing or unexpected"
            exit 1
          fi
          DIGEST=$(tr -d '[:space:]' < "$DIGEST_FILE")
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "digest artifact is missing or invalid"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image=${AR_REPO}/olw-pipeline@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Freeze production rollback contract
        id: rollback
        env:
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          ROLLBACK_ARTIFACT_NAME="worker-rollback-contract-${COMMIT_SHA}"
          EVIDENCE_ARTIFACT_NAME="worker-deployment-evidence-${COMMIT_SHA}"
          python3 scripts/render_worker_deployment_evidence.py prepare-rollback \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --job-name "${JOB_NAME}" \
            --ar-repo "${AR_REPO}" \
            --artifact-name "$ROLLBACK_ARTIFACT_NAME" \
            --output "$ROLLBACK_CONTRACT"
          echo "rollback_artifact_name=$ROLLBACK_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "evidence_artifact_name=$EVIDENCE_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: Prepare validated deployment metadata before mutation
        env:
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
          IMMUTABLE_IMAGE: ${{ steps.image.outputs.image }}
          DEV_RUN_ID: ${{ steps.dev_run.outputs.run_id }}
          DEV_RUN_URL: ${{ steps.dev_run.outputs.run_url }}
          DEV_RUN_EVENT: ${{ steps.dev_run.outputs.run_event }}
          DEV_RUN_HEAD_BRANCH: ${{ steps.dev_run.outputs.run_head_branch }}
          DEV_RUN_HEAD_SHA: ${{ steps.dev_run.outputs.run_head_sha }}
          DEV_RUN_CONCLUSION: ${{ steps.dev_run.outputs.run_conclusion }}
          ROLLBACK_ARTIFACT_NAME: ${{ steps.rollback.outputs.rollback_artifact_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          jq -n \
            --arg project "$PROJECT_ID" \
            --arg component "olw-worker" \
            --arg environment "production" \
            --arg action "promote" \
            --argjson schema_version 1 \
            --arg commit_sha "$COMMIT_SHA" \
            --arg source_ref "refs/heads/main" \
            --arg dev_workflow "deploy-worker.yml" \
            --arg dev_event "$DEV_RUN_EVENT" \
            --arg dev_head_branch "$DEV_RUN_HEAD_BRANCH" \
            --arg dev_head_sha "$DEV_RUN_HEAD_SHA" \
            --arg dev_conclusion "$DEV_RUN_CONCLUSION" \
            --argjson dev_run_id "$DEV_RUN_ID" \
            --arg dev_run_url "$DEV_RUN_URL" \
            --arg image "$IMMUTABLE_IMAGE" \
            --arg digest "${IMMUTABLE_IMAGE##*@}" \
            --arg rollback_artifact_name "$ROLLBACK_ARTIFACT_NAME" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --argjson workflow_run_id "$GITHUB_RUN_ID" \
            --argjson workflow_run_attempt "$GITHUB_RUN_ATTEMPT" \
            '{schema_version: $schema_version, project: $project, component: $component, environment: $environment, action: $action, rollback_artifact_name: $rollback_artifact_name, source: {commit_sha: $commit_sha, ref: $source_ref}, dev_provenance: {workflow: $dev_workflow, event: $dev_event, head_branch: $dev_head_branch, head_sha: $dev_head_sha, conclusion: $dev_conclusion, run_id: $dev_run_id, run_url: $dev_run_url}, image: {digest: $digest, reference: $image}, originating_workflow: {repository: $repository, workflow: $workflow, run_id: $workflow_run_id, run_attempt: $workflow_run_attempt}}' \
            > "$METADATA"
          python3 scripts/render_worker_deployment_evidence.py validate-metadata \
            --project "$PROJECT_ID" \
            --ar-repo "$AR_REPO" \
            --metadata "$METADATA"

      - name: Upload validated rollback contract
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.rollback.outputs.rollback_artifact_name }}
          path: ${{ env.ROLLBACK_CONTRACT }}
          if-no-files-found: error
          retention-days: 90

      - name: Update production worker
        env:
          IMMUTABLE_IMAGE: ${{ steps.image.outputs.image }}
          BUCKET: llm-wiki-data
        run: |
          set -euo pipefail
          gcloud run jobs update "${JOB_NAME}" \
            --image "$IMMUTABLE_IMAGE" \
            --update-env-vars "BUCKET=${BUCKET}" \
            --remove-env-vars "DATA_DIR,WORKSPACE,VAULT_PATH,WORKSPACE_DIR" \
            --args "^@^run@[[\"run\",\"--auto-approve\"]]" \
            --clear-volume-mounts \
            --clear-volumes \
            --region "${REGION}" \
            --quiet

      - name: Render normalized deployment evidence after strict read-back
        env:
          BUCKET: llm-wiki-data
          EXPECTED_RUNTIME_SERVICE_ACCOUNT: lwc-worker@llm-wiki-cloud.iam.gserviceaccount.com
        run: |
          set -euo pipefail
          python3 scripts/render_worker_deployment_evidence.py render-evidence \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --job-name "$JOB_NAME" \
            --ar-repo "$AR_REPO" \
            --bucket "$BUCKET" \
            --expected-runtime-service-account "$EXPECTED_RUNTIME_SERVICE_ACCOUNT" \
            --rollback-contract "$ROLLBACK_CONTRACT" \
            --metadata "$METADATA" \
            --output "$EVIDENCE" \
            --failure-output "$EVIDENCE_FAILURE"

      - name: Finalize partial evidence when provider verification is unknown
        if: always()
        run: |
          set -euo pipefail
          if [[ -e "$EVIDENCE" ]]; then
            echo "verified evidence already exists; preserving it"
          elif [[ -f "$ROLLBACK_CONTRACT" && -f "$METADATA" ]]; then
            python3 scripts/render_worker_deployment_evidence.py render-partial \
              --project "$PROJECT_ID" \
              --region "$REGION" \
              --job-name "$JOB_NAME" \
              --ar-repo "$AR_REPO" \
              --rollback-contract "$ROLLBACK_CONTRACT" \
              --metadata "$METADATA" \
              --output "$EVIDENCE" \
              --failure-output "$EVIDENCE_FAILURE"
          else
            echo "rollback or validated metadata is unavailable; no evidence fabricated"
          fi

      - name: Upload normalized deployment evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.rollback.outputs.evidence_artifact_name }}
          path: ${{ env.EVIDENCE }}
          if-no-files-found: ignore
          retention-days: 90

      - name: Tag promoted production image
        env:
          IMMUTABLE_IMAGE: ${{ steps.image.outputs.image }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
        run: |
          set -euo pipefail
          gcloud artifacts docker tags add \
            "$IMMUTABLE_IMAGE" \
            "${AR_REPO}/olw-pipeline:prod-${COMMIT_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --quiet
