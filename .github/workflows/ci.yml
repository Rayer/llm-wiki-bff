name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Validate product version
        run: |
          set -euo pipefail
          APP_VERSION=$(go run ./cmd/versioncheck VERSION)
      - run: go vet ./...
      - run: go test ./... -v -count=1 -race
