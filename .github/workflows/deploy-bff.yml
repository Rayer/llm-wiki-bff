name: Deploy BFF to Cloud Run (dev)

on:
  push:
    branches:
      - develop/1.0
  workflow_dispatch:

env:
  PROJECT_ID: llm-wiki-cloud
  SERVICE_NAME: llm-wiki-bff-dev
  REGION: asia-east1
  AR_REPO: asia-east1-docker.pkg.dev/llm-wiki-cloud/cloud-run-images

jobs:
  test-and-deploy:
    name: Test & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run Go tests
        run: go test ./... -count=1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build and deploy to Cloud Run
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE="${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:$SHORT_SHA"
          echo "Building $IMAGE…"
          gcloud builds submit --tag "$IMAGE" --timeout=600s --suppress-logs --quiet
          echo "Deploying $IMAGE…"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --network default --subnet default \
            --vpc-egress all-traffic \
            --allow-unauthenticated \
            --quiet
          echo "✅ Deployed ${{ env.SERVICE_NAME }} ($SHORT_SHA)"

      - name: Show deployment info
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)"
