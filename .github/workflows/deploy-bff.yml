name: Deploy BFF to Cloud Run (dev)

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

env:
  PROJECT_ID: llm-wiki-cloud
  SERVICE_NAME: llm-wiki-bff-dev
  REGION: asia-east1
  AR_REPO: asia-east1-docker.pkg.dev/llm-wiki-cloud/cloud-run-images

jobs:
  test-and-deploy:
    name: Test & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 80

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run Go tests
        run: go test ./... -count=1

      - name: Run Go vet
        run: go vet ./...

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Resolve build identity
        id: identity
        run: |
          set -euo pipefail
          APP_VERSION=$(go run ./cmd/versioncheck VERSION)
          GIT_SHA=$(git rev-parse HEAD)
          if [[ ! "$GIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "GIT_SHA must be a 40-character lowercase commit SHA"
            exit 1
          fi
          GIT_BRANCH="${GITHUB_REF_NAME}"
          if [[ ! "$GIT_BRANCH" =~ ^[0-9A-Za-z][0-9A-Za-z._/-]*$ ]]; then
            echo "GIT_BRANCH is invalid: $GIT_BRANCH"
            exit 1
          fi
          mapfile -t exact_tags < <(git tag --points-at HEAD --format='%(refname:strip=2)')
          if (( ${#exact_tags[@]} > 1 )); then
            echo "multiple exact git tags point at HEAD"
            exit 1
          fi
          GIT_TAG="${exact_tags[0]:-}"
          if [[ -n "$GIT_TAG" && ! "$GIT_TAG" =~ ^[0-9A-Za-z][0-9A-Za-z._/-]*$ ]]; then
            echo "GIT_TAG is invalid: $GIT_TAG"
            exit 1
          fi
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "git_sha=$GIT_SHA" >> "$GITHUB_OUTPUT"
          echo "git_branch=$GIT_BRANCH" >> "$GITHUB_OUTPUT"
          echo "git_tag=$GIT_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and deploy to Cloud Run
        id: build
        env:
          BUCKET: llm-wiki-data-dev
          FIRESTORE_DATABASE_ID: llm-wiki-cloud-dev
          PIPELINE_JOB_NAME: olw-pipeline-dev
          RUNTIME_SERVICE_ACCOUNT: lwc-bff-dev@llm-wiki-cloud.iam.gserviceaccount.com
          JWT_SECRET_NAME: jwt-secret-dev
          ALLOWED_ORIGINS: https://llm-wiki-frontend-dev.vercel.app,http://localhost:3000,http://127.0.0.1:3000
          APP_VERSION: ${{ steps.identity.outputs.app_version }}
          GIT_SHA: ${{ steps.identity.outputs.git_sha }}
          GIT_BRANCH: ${{ steps.identity.outputs.git_branch }}
          GIT_TAG: ${{ steps.identity.outputs.git_tag }}
        run: |
          set -euo pipefail
          IMAGE="${{ env.AR_REPO }}/llm-wiki-bff:$GIT_SHA"
          echo "Building ${IMAGE}…"
          BUILD_ID=$(gcloud builds submit \
            --config cloudbuild-bff.yaml \
            --substitutions="_IMAGE=$IMAGE,_APP_VERSION=$APP_VERSION,_GIT_SHA=$GIT_SHA,_GIT_BRANCH=$GIT_BRANCH,_GIT_TAG=$GIT_TAG" \
            --timeout=600s \
            --async \
            --suppress-logs \
            --format='value(id)' \
            --quiet)
          if [[ ! "$BUILD_ID" =~ ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$ ]]; then
            echo "Cloud Build submission returned an invalid build ID: $BUILD_ID"
            exit 1
          fi
          echo "Submitted Cloud Build $BUILD_ID; waiting for completion…"

          STATUS=""
          # Cloud Build's default queue TTL is 3600s; add the 600s build
          # timeout and a 120s polling buffer so valid queued builds can finish.
          POLL_DEADLINE=$((SECONDS + 4320))
          while (( SECONDS < POLL_DEADLINE )); do
            if ! STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project="${{ env.PROJECT_ID }}" \
              --format='value(status)' \
              --quiet); then
              echo "Unable to read Cloud Build $BUILD_ID status; failing closed."
              exit 1
            fi
            case "$STATUS" in
              SUCCESS)
                echo "Cloud Build $BUILD_ID completed successfully."
                break
                ;;
              PENDING|QUEUED|WORKING)
                sleep 15
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED|STATUS_UNKNOWN|UNKNOWN|"")
                echo "Cloud Build $BUILD_ID ended with status '${STATUS:-empty}'; refusing to deploy."
                exit 1
                ;;
              *)
                echo "Cloud Build $BUILD_ID returned unknown status '$STATUS'; refusing to deploy."
                exit 1
                ;;
            esac
          done
          if [[ "$STATUS" != SUCCESS ]]; then
            echo "Timed out waiting for Cloud Build $BUILD_ID after 4320 seconds; refusing to deploy."
            exit 1
          fi

          if ! BUILD_RESULT=$(gcloud builds describe "$BUILD_ID" \
            --project="${{ env.PROJECT_ID }}" \
            --format=json \
            --quiet); then
            echo "Unable to read successful Cloud Build $BUILD_ID result; failing closed."
            exit 1
          fi
          if ! RESULT_IMAGES=$(jq -cer --arg image "$IMAGE" \
            '[.results.images[]? | select(.name == $image)]' <<<"$BUILD_RESULT"); then
            echo "Cloud Build $BUILD_ID returned an unreadable image result; failing closed."
            exit 1
          fi
          RESULT_IMAGE_COUNT=$(jq -er 'length' <<<"$RESULT_IMAGES")
          if [[ "$RESULT_IMAGE_COUNT" != "1" ]]; then
            echo "Cloud Build $BUILD_ID returned $RESULT_IMAGE_COUNT image results for $IMAGE; refusing to deploy."
            exit 1
          fi
          DIGEST=$(jq -er '.[0].digest' <<<"$RESULT_IMAGES")
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Cloud Build $BUILD_ID returned an invalid image digest; refusing to deploy."
            exit 1
          fi
          IMMUTABLE_IMAGE="${{ env.AR_REPO }}/llm-wiki-bff@$DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "immutable_image=$IMMUTABLE_IMAGE" >> "$GITHUB_OUTPUT"

          echo "Deploying ${IMMUTABLE_IMAGE}…"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMMUTABLE_IMAGE" \
            --region ${{ env.REGION }} \
            --service-account "${{ env.RUNTIME_SERVICE_ACCOUNT }}" \
            --network default --subnet default \
            --vpc-egress private-ranges-only \
            --allow-unauthenticated \
            --update-secrets "JWT_SECRET=${{ env.JWT_SECRET_NAME }}:latest,DEEPSEEK_API_KEY=deepseek-apikey:latest" \
            --update-env-vars "^@^GCP_PROJECT=${{ env.PROJECT_ID }}@BUCKET=${{ env.BUCKET }}@FIRESTORE_DATABASE_ID=${{ env.FIRESTORE_DATABASE_ID }}@PIPELINE_JOB_URL=https://run.googleapis.com/v2/projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/jobs/${{ env.PIPELINE_JOB_NAME }}:run@ALLOWED_ORIGINS=${{ env.ALLOWED_ORIGINS }}@DEV_JWT=false" \
            --quiet
          gcloud run jobs add-iam-policy-binding "${{ env.PIPELINE_JOB_NAME }}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --member "serviceAccount:${{ env.RUNTIME_SERVICE_ACCOUNT }}" \
            --role roles/run.jobsExecutorWithOverrides \
            --quiet
          echo "✅ Deployed ${{ env.SERVICE_NAME }} ($GIT_SHA)"

          LATEST_READY_REVISION=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format='value(status.latestReadyRevisionName)' \
            --quiet)
          if [[ -z "$LATEST_READY_REVISION" ]]; then
            echo "Cloud Run did not report a latest ready revision; refusing to publish provenance."
            exit 1
          fi
          DEPLOYED_IMAGE_DIGEST=$(gcloud run revisions describe "$LATEST_READY_REVISION" \
            --region ${{ env.REGION }} \
            --format='value(status.imageDigest)' \
            --quiet)
          if [[ "$DEPLOYED_IMAGE_DIGEST" != "$IMMUTABLE_IMAGE" ]]; then
            echo "Latest ready revision $LATEST_READY_REVISION image digest does not match the deployed build result; refusing to publish provenance."
            exit 1
          fi

      - name: Persist build image digest
        id: image_digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          COMMIT_SHA="${{ steps.identity.outputs.git_sha }}"
          if [[ ! "$COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "built commit SHA must be a 40-character lowercase commit SHA"
            exit 1
          fi
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Cloud Build image digest is missing or invalid"
            exit 1
          fi
          DIGEST_FILE="bff-image-digest-$COMMIT_SHA.txt"
          printf '%s\n' "$DIGEST" > "$DIGEST_FILE"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "digest_file=$DIGEST_FILE" >> "$GITHUB_OUTPUT"
          echo "Persisted Cloud Build image digest $DIGEST"

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: bff-image-digest-${{ steps.image_digest.outputs.commit_sha }}
          path: ${{ steps.image_digest.outputs.digest_file }}
          if-no-files-found: error

      - name: Tag deployed dev image (fail-closed)
        env:
          IMMUTABLE_IMAGE: ${{ env.AR_REPO }}/llm-wiki-bff@${{ steps.image_digest.outputs.digest }}
        run: |
          set -euo pipefail
          DEV_IMAGE_TAG="${{ env.AR_REPO }}/llm-wiki-bff:dev-${{ steps.identity.outputs.git_sha }}"
          gcloud artifacts docker tags add \
            "$IMMUTABLE_IMAGE" \
            "$DEV_IMAGE_TAG" \
            --quiet

      - name: Show deployment info
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)"
