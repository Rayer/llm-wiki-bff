name: Deploy BFF to Cloud Run (dev)

on:
  push:
    branches:
      - develop/1.0

env:
  PROJECT_ID: llm-wiki-cloud
  SERVICE_NAME: llm-wiki-bff-dev
  REGION: asia-east1
  BFF_IMAGE: gcr.io/llm-wiki-cloud/llm-wiki-bff-dev
  PIPELINE_IMAGE: gcr.io/llm-wiki-cloud/olw-worker-fuse

jobs:
  test-and-deploy-bff:
    name: Test & Deploy BFF
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run Go tests
        run: go test ./... -count=1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build and deploy to Cloud Run
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:$SHORT_SHA"
          gcloud builds submit --tag "$TAG" --timeout=600s --quiet
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$TAG" \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --quiet

      - name: Show deployment info
        run: |
          echo "✅ Deployed ${{ env.SERVICE_NAME }} (commit $SHORT_SHA)"
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)"
