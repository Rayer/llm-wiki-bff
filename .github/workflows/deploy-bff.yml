name: Deploy BFF to Cloud Run (dev)

on:
  push:
    branches:
      - develop/1.0
  workflow_dispatch:

env:
  PROJECT_ID: llm-wiki-cloud
  SERVICE_NAME: llm-wiki-bff-dev
  REGION: asia-east1
  AR_REPO: asia-east1-docker.pkg.dev/llm-wiki-cloud/cloud-run-images

jobs:
  test-and-deploy:
    name: Test & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 80

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run Go tests
        run: go test ./... -count=1

      - name: Run Go vet
        run: go vet ./...

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build and deploy to Cloud Run
        env:
          BUCKET: llm-wiki-data-dev
          FIRESTORE_DATABASE_ID: llm-wiki-cloud-dev
          PIPELINE_JOB_NAME: olw-pipeline-dev
          RUNTIME_SERVICE_ACCOUNT: lwc-bff-dev@llm-wiki-cloud.iam.gserviceaccount.com
          JWT_SECRET_NAME: jwt-secret-dev
          ALLOWED_ORIGINS: https://llm-wiki-frontend-dev.vercel.app,http://localhost:3000,http://127.0.0.1:3000
        run: |
          set -euo pipefail
          COMMIT_SHA=$(git rev-parse HEAD)
          IMAGE="${{ env.AR_REPO }}/llm-wiki-bff:$COMMIT_SHA"
          echo "Building ${IMAGE}…"
          BUILD_ID=$(gcloud builds submit \
            --tag "$IMAGE" \
            --timeout=600s \
            --async \
            --suppress-logs \
            --format='value(id)' \
            --quiet)
          if [[ ! "$BUILD_ID" =~ ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$ ]]; then
            echo "Cloud Build submission returned an invalid build ID: $BUILD_ID"
            exit 1
          fi
          echo "Submitted Cloud Build $BUILD_ID; waiting for completion…"

          STATUS=""
          # Cloud Build's default queue TTL is 3600s; add the 600s build
          # timeout and a 120s polling buffer so valid queued builds can finish.
          POLL_DEADLINE=$((SECONDS + 4320))
          while (( SECONDS < POLL_DEADLINE )); do
            if ! STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project="${{ env.PROJECT_ID }}" \
              --format='value(status)' \
              --quiet); then
              echo "Unable to read Cloud Build $BUILD_ID status; failing closed."
              exit 1
            fi
            case "$STATUS" in
              SUCCESS)
                echo "Cloud Build $BUILD_ID completed successfully."
                break
                ;;
              PENDING|QUEUED|WORKING)
                sleep 15
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED|STATUS_UNKNOWN|UNKNOWN|"")
                echo "Cloud Build $BUILD_ID ended with status '${STATUS:-empty}'; refusing to deploy."
                exit 1
                ;;
              *)
                echo "Cloud Build $BUILD_ID returned unknown status '$STATUS'; refusing to deploy."
                exit 1
                ;;
            esac
          done
          if [[ "$STATUS" != SUCCESS ]]; then
            echo "Timed out waiting for Cloud Build $BUILD_ID after 4320 seconds; refusing to deploy."
            exit 1
          fi

          echo "Deploying ${IMAGE}…"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --service-account "${{ env.RUNTIME_SERVICE_ACCOUNT }}" \
            --network default --subnet default \
            --vpc-egress all-traffic \
            --allow-unauthenticated \
            --update-secrets "JWT_SECRET=${{ env.JWT_SECRET_NAME }}:latest,DEEPSEEK_API_KEY=deepseek-apikey:latest" \
            --update-env-vars "^@^GCP_PROJECT=${{ env.PROJECT_ID }}@BUCKET=${{ env.BUCKET }}@FIRESTORE_DATABASE_ID=${{ env.FIRESTORE_DATABASE_ID }}@PIPELINE_JOB_URL=https://run.googleapis.com/v2/projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/jobs/${{ env.PIPELINE_JOB_NAME }}:run@ALLOWED_ORIGINS=${{ env.ALLOWED_ORIGINS }}@DEV_JWT=false" \
            --quiet
          echo "✅ Deployed ${{ env.SERVICE_NAME }} ($COMMIT_SHA)"

      - name: Resolve deployed image digest
        id: image_digest
        run: |
          set -euo pipefail
          COMMIT_SHA=$(git rev-parse HEAD)
          if [[ ! "$COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "built commit SHA must be a 40-character lowercase commit SHA"
            exit 1
          fi
          IMAGE="${{ env.AR_REPO }}/llm-wiki-bff:$COMMIT_SHA"
          DIGEST=$(gcloud artifacts docker images describe "$IMAGE" --format="value(image_summary.digest)" --quiet)
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "deployed image digest is missing or invalid"
            exit 1
          fi
          DIGEST_FILE="bff-image-digest-$COMMIT_SHA.txt"
          printf '%s\n' "$DIGEST" > "$DIGEST_FILE"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "digest_file=$DIGEST_FILE" >> "$GITHUB_OUTPUT"
          echo "Resolved $IMAGE to $DIGEST"

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: bff-image-digest-${{ steps.image_digest.outputs.commit_sha }}
          path: ${{ steps.image_digest.outputs.digest_file }}
          if-no-files-found: error

      - name: Update dev channel tag (fail-closed)
        env:
          IMMUTABLE_IMAGE: ${{ env.AR_REPO }}/llm-wiki-bff@${{ steps.image_digest.outputs.digest }}
        run: |
          set -euo pipefail
          gcloud artifacts docker tags add \
            "$IMMUTABLE_IMAGE" \
            "${{ env.AR_REPO }}/llm-wiki-bff:dev" \
            --quiet

      - name: Show deployment info
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)"
